services:
  # Backend API Service
  - type: web
    name: medcarbon-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 7860

  # Frontend Static Site
  - type: web
    name: medcarbon-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        # Replace with the actual URL of the backend once deployed, e.g. https://medcarbon-backend.onrender.com
        value: https://medcarbon-backend.onrender.com
    routes:
      # Redirect all unknown routes to index.html for React Router (SPA)
      - type: rewrite
        source: /*
        destination: /index.html
